<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>퇴근요정 — 인터랙티브 프로토타입</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<style>
@import url("https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css");

:root {
  --accent: #C3B1E1;
  --bg: #F3F0F8;
  --ink: #3B3550;
  --muted: #8a82a0;
  --panel: #FBFAFE;
  font-family: "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", system-ui, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background:
    radial-gradient(900px 520px at 50% -8%, #FAF7FF 0%, transparent 60%),
    linear-gradient(180deg, #F3F0F8 0%, #ECE7F4 100%);
  min-height: 100vh;
  color: var(--ink);
}
#root { min-height: 100vh; }

.app {
  max-width: 720px; margin: 0 auto; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 26px 20px 30px;
}

/* ---------- 헤더 ---------- */
.masthead { display: flex; align-items: center; gap: 14px; align-self: flex-start; margin-bottom: 4px; }
.logo-mark { width: 62px; height: 62px; display: grid; place-items: center;
  background: #fff; border: 2px solid var(--ink); border-radius: 12px;
  box-shadow: 4px 4px 0 rgba(59,53,80,.12); overflow: hidden; }
.logo-mark canvas { margin-top: 2px; }
.masthead h1 { font-family: "Galmuri11", monospace; font-size: 26px; margin: 0; letter-spacing: .5px; }
.masthead p { margin: 3px 0 0; font-size: 13px; color: var(--muted); }

/* ---------- 무대 ---------- */
.stage {
  flex: 1; width: 100%; display: grid; place-items: center;
  min-height: 380px; padding: 8px 0 4px;
}

/* ---------- 컨트롤 바 ---------- */
.ctrl-wrap { width: 100%; max-width: 480px; }
.ctrl-card {
  background: var(--panel); border: 2px solid var(--ink); border-radius: 16px;
  box-shadow: 0 10px 30px rgba(80,64,120,.14), 6px 6px 0 rgba(59,53,80,.07);
  padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px;
}
.ctrl-top { display: flex; align-items: center; gap: 10px; }
.clock { display: flex; align-items: baseline; font-family: "Galmuri11", monospace; }
.clock-num { font-size: 26px; color: var(--ink); }
.clock-sec { font-size: 15px; color: var(--muted); margin-left: 1px; }
.phase-pill { display: flex; flex-direction: column; line-height: 1.15;
  padding: 5px 11px; border-radius: 9px; border: 1.5px solid rgba(59,53,80,.18); }
.phase-pill b { font-size: 13px; }
.phase-pill span { font-size: 10.5px; color: #6f6790; }
.gear { font-family: "Galmuri11", monospace; font-size: 13px; cursor: pointer; white-space: nowrap;
  background: #fff; border: 2px solid var(--ink); border-radius: 9px; padding: 6px 11px;
  color: var(--ink); box-shadow: 2px 2px 0 rgba(59,53,80,.15); transition: transform .08s; }
.gear:active { transform: translate(2px,2px); box-shadow: none; }

/* 스크러버 */
.scrub-row { display: flex; align-items: center; gap: 9px; }
.t-label { font-family: "Galmuri11", monospace; font-size: 10.5px; color: var(--muted); }
.scrubber { flex: 1; -webkit-appearance: none; appearance: none; height: 8px; border-radius: 6px;
  background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 70%, white), var(--accent));
  border: 1.5px solid rgba(59,53,80,.25); outline: none; }
.scrubber::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 5px;
  background: #fff; border: 2.5px solid var(--ink); cursor: pointer; box-shadow: 2px 2px 0 rgba(59,53,80,.18); }
.scrubber::-moz-range-thumb { width: 18px; height: 18px; border-radius: 5px;
  background: #fff; border: 2.5px solid var(--ink); cursor: pointer; }

/* 점프 버튼 */
.jump-row { display: flex; gap: 6px; flex-wrap: wrap; }
.jump-btn { flex: 1; min-width: 56px; font-family: "Galmuri11", monospace; font-size: 12.5px; white-space: nowrap;
  padding: 7px 4px; border-radius: 9px; cursor: pointer; color: var(--ink);
  background: #fff; border: 2px solid rgba(59,53,80,.32); transition: all .12s; }
.jump-btn:hover { border-color: var(--ink); }
.jump-btn.on { background: var(--accent); border-color: var(--ink);
  box-shadow: inset 0 -2px 0 rgba(59,53,80,.18); }

/* 재생/속도/실시간 */
.play-row { display: flex; align-items: center; gap: 9px; }
.play-btn { font-family: "Galmuri11", monospace; font-size: 13px; cursor: pointer; color: var(--ink); white-space: nowrap;
  background: #fff; border: 2px solid var(--ink); border-radius: 9px; padding: 7px 13px;
  box-shadow: 2px 2px 0 rgba(59,53,80,.15); }
.play-btn.on { background: color-mix(in srgb, var(--accent) 50%, white); }
.play-btn:active { transform: translate(2px,2px); box-shadow: none; }
.speed-seg { display: flex; border: 2px solid var(--ink); border-radius: 9px; overflow: hidden; }
.speed-seg .seg { font-family: "Galmuri11", monospace; font-size: 12px; padding: 7px 9px; cursor: pointer;
  background: #fff; border: none; border-right: 2px solid var(--ink); color: var(--ink); }
.speed-seg .seg:last-child { border-right: none; }
.speed-seg .seg.on { background: var(--accent); }
.rt-toggle { display: flex; align-items: center; gap: 5px; margin-left: auto; font-size: 12.5px; color: #5b5470; cursor: pointer; }
.rt-toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.ctrl-foot { text-align: center; font-size: 11px; color: var(--muted); margin-top: 9px; }

/* ---------- 설정 모달 ---------- */
.modal-backdrop { position: fixed; inset: 0; background: rgba(40,32,60,.42);
  backdrop-filter: blur(3px); display: grid; place-items: center; z-index: 100; padding: 20px;
  animation: fade .18s ease; }
@keyframes fade { from { opacity: 0; } }
.modal { width: 380px; max-width: 100%; max-height: 88vh; overflow: auto;
  background: var(--panel); border: 3px solid var(--ink); border-radius: 16px;
  box-shadow: 10px 12px 0 rgba(59,53,80,.18); }
.modal-titlebar { position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between;
  background: var(--accent); border-bottom: 3px solid var(--ink); padding: 11px 14px; color: var(--ink); }
.x-btn { font-family: "Galmuri11", monospace; cursor: pointer; background: #fff; color: var(--ink);
  border: 2px solid var(--ink); border-radius: 7px; width: 28px; height: 28px; font-size: 13px; }
.modal-body { padding: 16px 18px 20px; }
.sect-label { font-family: "Galmuri11", monospace; font-size: 13px; color: var(--muted);
  margin-bottom: 9px; letter-spacing: .3px; }
.char-grid { display: flex; flex-direction: column; gap: 8px; }
.char-card { display: flex; align-items: center; gap: 12px; text-align: left; cursor: pointer;
  background: #fff; border: 2px solid rgba(59,53,80,.22); border-radius: 12px; padding: 9px 11px;
  position: relative; transition: all .12s; }
.char-card:hover { border-color: var(--ink); }
.char-card.sel { border-color: var(--ink); background: color-mix(in srgb, var(--accent) 16%, white);
  box-shadow: 3px 3px 0 rgba(59,53,80,.14); }
.char-card canvas { flex-shrink: 0; }
.sel-dot { position: absolute; top: 8px; right: 10px; font-size: 11px; color: var(--accent);
  filter: drop-shadow(0 0 1px var(--ink)); }
.hint { font-size: 11.5px; color: var(--muted); margin-top: 12px; line-height: 1.5;
  background: color-mix(in srgb, var(--accent) 12%, white); padding: 9px 11px; border-radius: 9px; }
.step { font-family: "Galmuri11", monospace; cursor: pointer; background: #fff; color: var(--ink);
  border: 2px solid var(--ink); border-radius: 6px; width: 26px; height: 28px; font-size: 11px; }
.step:active { transform: translateY(1px); }

@media (max-width: 520px) {
  .masthead h1 { font-size: 22px; }
  .ctrl-card { padding: 12px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="scripts/sprites.jsx"></script>
<script type="text/babel" src="scripts/tweaks-panel.jsx"></script>
<script type="text/babel" src="scripts/widget.jsx"></script>
<script type="text/babel" src="scripts/app.jsx"></script>
</body>
</html>
